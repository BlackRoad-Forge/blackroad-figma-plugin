name: "\U0001F527 Self-Healing"

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:
  workflow_run:
    workflows: ["\U0001F680 Auto Deploy"]
    types: [completed]

permissions:
  contents: write
  issues: write
  actions: read

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check Health
        id: health
        run: |
          if [ -z "${{ secrets.DEPLOY_URL }}" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "DEPLOY_URL not configured, skipping health check"
            exit 0
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}" --max-time 30 || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check returned status: $STATUS"

      - name: Auto-Rollback
        if: steps.health.outputs.status != '200' && steps.health.outputs.status != 'skip' && steps.health.outputs.status != '000'
        run: |
          echo "Health check failed (Status: ${{ steps.health.outputs.status }})"
          echo "Triggering rollback to previous commit..."
          gh workflow run auto-deploy.yml --ref $(git rev-parse HEAD~1)
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-generated,deployment'
            });
            if (issues.data.length === 0) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Self-Healing: Deployment Health Check Failed',
                body: `Deployment health check failed.\n\nStatus: ${{ steps.health.outputs.status }}\nWorkflow: ${context.workflow}\nRun: ${context.runId}\nTime: ${new Date().toISOString()}`,
                labels: ['bug', 'deployment', 'auto-generated']
              });
            }

  dependency-updates:
    name: Auto Update Dependencies
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      - name: Update npm dependencies
        if: hashFiles('package.json') != ''
        run: |
          npm update
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "BlackRoad Bot"
            git config user.email "bot@blackroad.io"
            git add package*.json
            git commit -m "chore: auto-update dependencies"
            git push
          fi
